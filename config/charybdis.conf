CONFIG_ZMK_KEYBOARD_NAME="Charybdis"

# Bluetooth Security - Require passkey during pairing
CONFIG_ZMK_BLE_PASSKEY_ENTRY=y

CONFIG_BT_CTLR_TX_PWR_PLUS_8=y
CONFIG_ZMK_BLE_EXPERIMENTAL_CONN=y

# Fix freezing issues by enabling proper Deep Sleep
CONFIG_ZMK_SLEEP=y
# 30 seconds before standard idle
CONFIG_ZMK_IDLE_TIMEOUT=30000
# 2 hours before deep sleep (prevents trackball from causing sleep while browsing)
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=7200000

# Enable pointing and high-resolution smooth scrolling for Mac
CONFIG_ZMK_POINTING=y
CONFIG_ZMK_POINTING_SMOOTH_SCROLLING=y

# Increase Bluetooth polling rate to max allowed (133Hz) for smoother trackball
CONFIG_BT_PERIPHERAL_PREF_MIN_INT=6
CONFIG_BT_PERIPHERAL_PREF_MAX_INT=6
